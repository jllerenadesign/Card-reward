<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scratch Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f1f2f4;
        --card: #000000;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }

      .frame {
        width: 100vw;
        height: 100dvh;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 28px;
        position: relative;
        perspective: 1200px;
      }

      .cards {
        display: flex;
        gap: 36px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
      }

      .card-wrap {
        width: 720px;
        height: 530px;
        border-radius: 48px;
        background: var(--card);
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.28),
          0 0 0 1px rgba(255, 255, 255, 0.05);
        transform-style: preserve-3d;
        position: relative;
        overflow: hidden;
      }

      .card-wrap.card-02 {
        background: #00aca9;
      }

      .card-inner {
        width: 100%;
        height: 100%;
        border-radius: 48px;
        position: relative;
        transform-style: preserve-3d;
        background: var(--card);
      }

      .card-wrap.card-02 .card-inner {
        background: #00aca9;
      }

      .header {
        position: absolute;
        top: 24px;
        left: 24px;
        display: flex;
        align-items: center;
        gap: 20px;
        z-index: 3;
      }

      .header img {
        width: 72px;
        height: 72px;
        border-radius: 18px;
      }

      .card-wrap.card-02 .header img {
        width: 142px;
        height: 56px;
        border-radius: 0;
      }

      .header span {
        font-size: 36px;
        font-weight: 700;
        color: var(--white);
        letter-spacing: -0.02em;
      }

      .reward {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        margin-top: 49px;
        font-size: 140px;
        font-weight: 600;
        letter-spacing: -0.05em;
        color: var(--white);
        z-index: 0;
        pointer-events: none;
      }

      .overlay-wrap {
        width: 688px;
        height: 400px;
        border-radius: 24px;
        position: absolute;
        bottom: 16px;
        left: 16px;
        overflow: hidden;
        z-index: 2;
        touch-action: none;
      }

      .overlay-wrap canvas,
      .overlay-wrap .scratch-label {
        position: absolute;
        inset: 0;
      }

      .scratch-canvas {
        z-index: 1;
      }

      .holo-canvas {
        z-index: 2;
      }

      .light-canvas {
        z-index: 3;
      }

      .scratch-label {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: -0.01em;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.85),
          rgba(180, 180, 180, 0.6),
          rgba(255, 255, 255, 0.8)
        );
        -webkit-background-clip: text;
        color: transparent;
        transition: opacity 0.35s ease;
        pointer-events: none;
      }

      .particle-layer,
      .confetti-layer {
        position: absolute;
        pointer-events: none;
      }

      .particle-layer {
        inset: -80px;
        z-index: 4;
      }

      .confetti-layer {
        inset: -300px;
        z-index: 5;
      }

      .restart-btn {
        position: absolute;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        background: transparent;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 50px;
        padding: 10px 22px;
        font-size: 14px;
        font-weight: 400;
        color: rgba(0, 0, 0, 0.35);
        cursor: pointer;
      }

      @keyframes micro-jolt {
        0% {
          transform: translate3d(0, 0, 0);
        }
        25% {
          transform: translate3d(-1px, 1px, 0);
        }
        50% {
          transform: translate3d(1px, -1px, 0);
        }
        75% {
          transform: translate3d(-1px, 0, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      .card-wrap.card-02.is-jolting .card-inner {
        animation: micro-jolt 110ms linear;
      }

      @media (max-width: 780px) {
        html,
        body {
          overflow: auto;
        }

        .frame {
          width: 100%;
          min-height: 100dvh;
          height: auto;
          justify-content: flex-start;
          padding: 32px 20px 120px;
        }

        .cards {
          width: 100%;
          flex-direction: column;
          gap: 24px;
        }

        .restart-btn {
          position: static;
          transform: none;
        }
      }

      @media (max-width: 780px) {
        .card-wrap {
          width: min(100%, 720px);
          aspect-ratio: 720 / 530;
          height: auto;
          border-radius: 32px;
        }

        .card-inner {
          border-radius: 32px;
        }

        .header {
          top: clamp(14px, 3.2vw, 24px);
          left: clamp(14px, 3.2vw, 24px);
          gap: clamp(12px, 2vw, 20px);
        }

        .header img {
          width: clamp(48px, 10vw, 72px);
          height: clamp(48px, 10vw, 72px);
          border-radius: clamp(12px, 2vw, 18px);
        }

        .card-wrap.card-02 .header img {
          width: clamp(104px, 26vw, 142px);
          height: auto;
        }

        .header span {
          font-size: clamp(24px, 5vw, 36px);
        }

        .reward {
          font-size: clamp(84px, 18vw, 140px);
          margin-top: clamp(18px, 6vw, 49px);
        }

        .overlay-wrap {
          width: calc(100% - 32px);
          height: calc(100% - 114px);
          left: 16px;
          bottom: 16px;
          border-radius: 20px;
        }

        .scratch-label {
          font-size: clamp(20px, 4.4vw, 28px);
        }
      }
    </style>
  </head>

    <script>
      const frame = document.querySelector(".frame");
      const cards = Array.from(document.querySelectorAll(".card-wrap"));
      const restartBtn = document.getElementById("restartBtn");

      const OW = 688;
      const OH = 400;
      const cardW = 720;
      const cardH = 530;
      const borderRadius = 24;
      const isCoarsePointer = window.matchMedia("(pointer: coarse)").matches;
      const dpr = isCoarsePointer
        ? 1
        : Math.min(1.5, Math.max(1, window.devicePixelRatio || 1));
      const blobSteps = isCoarsePointer ? 44 : 80;
      const chipBurstMin = isCoarsePointer ? 2 : 4;
      const chipBurstMax = isCoarsePointer ? 5 : 9;
      const confettiCount = isCoarsePointer ? 120 : 280;
      const brushBaseRadius = isCoarsePointer ? 48 : 70;
      const brushNoiseAmplitude = isCoarsePointer ? 14 : 22;
      let motionEnabled = false;
      let motionPermissionRequested = false;
      let motionBaseline = null;
      let touchTiltActive = false;

      const chipPalette = [
        "#c8c8c8",
        "#e8e8e8",
        "#a0a0a0",
        "#f0f0f0",
        "#d0d0d0",
        "#b8b8b8",
        "#ffffff",
        "#888888",
      ];

      const confettiColors = [
        "#BF00FF",
        "#9B00FF",
        "#FF00C8",
        "#FF3DCA",
        "#00FF41",
        "#39FF14",
        "#00E5FF",
        "#00BFFF",
        "#FF00FF",
        "#CC00FF",
      ];

      function supportsHaptics() {
        return typeof navigator !== "undefined" && typeof navigator.vibrate === "function";
      }

      function vibrate(pattern) {
        if (supportsHaptics()) {
          navigator.vibrate(pattern);
        }
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function enableMotionTilt() {
        if (!isCoarsePointer || motionEnabled || typeof window === "undefined") {
          return Promise.resolve(false);
        }
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          return DeviceOrientationEvent.requestPermission()
            .then((result) => {
              motionEnabled = result === "granted";
              return motionEnabled;
            })
            .catch(() => false);
        }
        motionEnabled = typeof DeviceOrientationEvent !== "undefined";
        return Promise.resolve(motionEnabled);
      }

      function handleDeviceTilt(event) {
        if (!motionEnabled || !isCoarsePointer) {
          return;
        }
        if (typeof event.gamma !== "number" || typeof event.beta !== "number") {
          return;
        }
        if (!motionBaseline) {
          motionBaseline = {
            gamma: event.gamma,
            beta: event.beta,
          };
        }
        const deltaGamma = clamp(event.gamma - motionBaseline.gamma, -18, 18);
        const deltaBeta = clamp(event.beta - motionBaseline.beta, -14, 14);
        const nx = clamp(0.5 + deltaGamma / 36, 0, 1);
        const ny = clamp(0.5 + deltaBeta / 28, 0, 1);
        states.forEach((state) => {
          state.hovering = true;
          state.targetNX = nx;
          state.targetNY = ny;
        });
      }

      function handleTouchTilt(state, clientX, clientY) {
        const rect = state.card.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const inside = x >= 0 && y >= 0 && x <= rect.width && y <= rect.height;
        state.hovering = inside;
        if (!inside) {
          state.targetNX = 0.5;
          state.targetNY = 0.5;
          return;
        }
        state.targetNX = clamp(x / rect.width, 0, 1);
        state.targetNY = clamp(y / rect.height, 0, 1);
      }

      function startScratchSound(state) {
        if (!state.hasScratchAudio) {
          return;
        }
        if (!state.audioEl) {
          state.audioEl = new Audio("./sakani-scratch.mp3");
          state.audioEl.loop = true;
          state.audioEl.preload = "auto";
          state.audioEl.volume = 0.24;
          state.audioEl.playsInline = true;
          state.audioEl.setAttribute("playsinline", "");
        }
        if (!state.audioEl.paused) {
          return;
        }
        state.audioEl.currentTime = 0;
        state.audioEl.play().catch(() => {});
      }

      function stopScratchSound(state) {
        if (!state.audioEl) {
          return;
        }
        state.audioEl.pause();
        state.audioEl.currentTime = 0;
      }

      function updateScratchSound(state) {
        if (!state.audioEl || !state.isScratching) {
          return;
        }
        const nextVolume = 0.18 + state.curNX * 0.08 + Math.random() * 0.03;
        state.audioEl.volume = Math.min(0.34, nextVolume);
      }

      function triggerJolt(state) {
        if (!state.hasScratchAudio) {
          return;
        }
        state.card.classList.remove("is-jolting");
        void state.card.offsetWidth;
        state.card.classList.add("is-jolting");
        clearTimeout(state.joltTimer);
        state.joltTimer = setTimeout(() => {
          state.card.classList.remove("is-jolting");
        }, 120);
      }

      function setupCanvas(canvas, w, h) {
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;
        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return ctx;
      }

      function resizeCanvases(state) {
        setupCanvas(state.scratchCanvas, OW, OH);
        setupCanvas(state.holoCanvas, OW, OH);
        setupCanvas(state.lightCanvas, OW, OH);
        setupCanvas(state.chipCanvas, OW + 160, OH + 160);
        setupCanvas(state.confettiCanvas, cardW + 600, cardH + 600);
      }

      function drawScratchLayer(state) {
        const scratchCtx = state.scratchCtx;
        scratchCtx.clearRect(0, 0, OW, OH);
        const grad = scratchCtx.createLinearGradient(0, 0, OW, OH);
        grad.addColorStop(0.1, "#1A1A1A");
        grad.addColorStop(0.5, "#4D4D4D");
        grad.addColorStop(0.8, "#0D0D0D");

        scratchCtx.beginPath();
        scratchCtx.roundRect(0, 0, OW, OH, borderRadius);
        scratchCtx.fillStyle = grad;
        scratchCtx.fill();

        scratchCtx.fillStyle = "rgba(255,255,255,0.15)";
        for (let y = 14; y < OH; y += 18) {
          for (let x = 14; x < OW; x += 18) {
            scratchCtx.beginPath();
            scratchCtx.arc(x, y, 1.8, 0, Math.PI * 2);
            scratchCtx.fill();
          }
        }
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function createBrushConfig() {
        const harmonics = [1, 2, 3, 5, 7, 11, 13];
        const phases = harmonics.map(() => Math.random() * Math.PI * 2);
        const amps = harmonics.map((_, i) => 1 / (i * 0.5 + 1));
        const ampSum = amps.reduce((a, b) => a + b, 0);
        const normAmps = amps.map((a) => a / ampSum);
        const lumps = [];
        const lumpCount = Math.floor(rand(4, 9));
        for (let i = 0; i < lumpCount; i += 1) {
          lumps.push({
            angle: rand(0, Math.PI * 2),
            height: rand(10, 30),
            spread: rand(0.15, 0.4),
          });
        }
        return {
          harmonics,
          phases,
          normAmps,
          lumps,
          baseR: brushBaseRadius,
          noiseAmp: brushNoiseAmplitude,
        };
      }

      function generateBlobPath(ctx, x, y, brushConfig) {
        const {
          harmonics,
          phases,
          normAmps,
          lumps,
          baseR,
          noiseAmp,
        } = brushConfig;
        const points = [];
        for (let i = 0; i < blobSteps; i += 1) {
          const t = (i / blobSteps) * Math.PI * 2;
          let noise = 0;
          for (let j = 0; j < harmonics.length; j += 1) {
            noise +=
              normAmps[j] *
              Math.sin(harmonics[j] * t + phases[j]) *
              noiseAmp;
          }
          let lumpNoise = 0;
          for (const lump of lumps) {
            let d = Math.abs(t - lump.angle);
            d = Math.min(d, Math.PI * 2 - d);
            const influence = Math.exp(-(d * d) / (lump.spread * lump.spread));
            lumpNoise += influence * lump.height;
          }
          const r = baseR + noise + lumpNoise;
          const px = x + Math.cos(t) * r;
          const py = y + Math.sin(t) * r * 0.82;
          points.push({ x: px, y: py });
        }

        ctx.beginPath();
        for (let i = 0; i < points.length; i += 1) {
          const p0 = points[i];
          const p1 = points[(i + 1) % points.length];
          const mid = { x: (p0.x + p1.x) * 0.5, y: (p0.y + p1.y) * 0.5 };
          if (i === 0) {
            ctx.moveTo(mid.x, mid.y);
          } else {
            ctx.quadraticCurveTo(p0.x, p0.y, mid.x, mid.y);
          }
        }
        ctx.closePath();
      }

      function scratchAt(state, x, y) {
        const scratchCtx = state.scratchCtx;
        scratchCtx.save();
        scratchCtx.globalCompositeOperation = "destination-out";
        scratchCtx.imageSmoothingEnabled = false;
        generateBlobPath(scratchCtx, x, y, state.brushConfig);
        scratchCtx.fill();
        scratchCtx.restore();
      }

      function spawnChips(state, x, y) {
        const count = Math.floor(rand(chipBurstMin, chipBurstMax));
        for (let i = 0; i < count; i += 1) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(3, 9);
          state.chips.push({
            x: x + 80,
            y: y + 80,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            w: rand(3, 9),
            h: rand(2, 6),
            color: chipPalette[Math.floor(Math.random() * chipPalette.length)],
            life: 1,
          });
        }
      }

      function spawnConfetti(state) {
        const originX = cardW / 2 + 300;
        const originY = cardH / 2 + 300;
        for (let i = 0; i < confettiCount; i += 1) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(6, 20);
          state.confetti.push({
            x: originX,
            y: originY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 3,
            w: rand(8, 22),
            h: rand(4, 13),
            rot: rand(-0.25, 0.25),
            color:
              confettiColors[Math.floor(Math.random() * confettiColors.length)],
            life: 1,
            decay: rand(0.003, 0.007),
          });
        }
      }

      function updateParticles(state) {
        const chipCtx = state.chipCtx;
        const confettiCtx = state.confettiCtx;
        chipCtx.clearRect(0, 0, OW + 160, OH + 160);
        for (let i = state.chips.length - 1; i >= 0; i -= 1) {
          const chip = state.chips[i];
          chip.vy += 0.12;
          chip.vx *= 0.95;
          chip.vy *= 0.95;
          chip.x += chip.vx;
          chip.y += chip.vy;
          chip.life -= isCoarsePointer ? 0.03 : rand(0.018, 0.04);
          if (chip.life <= 0) {
            state.chips.splice(i, 1);
            continue;
          }
          chipCtx.globalAlpha = Math.max(0, chip.life);
          chipCtx.fillStyle = chip.color;
          chipCtx.fillRect(chip.x, chip.y, chip.w, chip.h);
        }
        chipCtx.globalAlpha = 1;

        if (state.confetti.length === 0) {
          confettiCtx.clearRect(0, 0, cardW + 600, cardH + 600);
          return;
        }
        confettiCtx.clearRect(0, 0, cardW + 600, cardH + 600);
        for (let i = state.confetti.length - 1; i >= 0; i -= 1) {
          const piece = state.confetti[i];
          piece.vy += 0.1;
          piece.vx *= 0.995;
          piece.vy *= 0.995;
          piece.x += piece.vx;
          piece.y += piece.vy;
          piece.life -= piece.decay;
          if (piece.life <= 0) {
            state.confetti.splice(i, 1);
            continue;
          }
          confettiCtx.save();
          confettiCtx.translate(piece.x, piece.y);
          confettiCtx.rotate(piece.rot);
          confettiCtx.globalAlpha = Math.max(0, piece.life);
          confettiCtx.fillStyle = piece.color;
          confettiCtx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
          confettiCtx.restore();
        }
        confettiCtx.globalAlpha = 1;
      }

      function updateHolo(state) {
        const holoCtx = state.holoCtx;
        holoCtx.clearRect(0, 0, OW, OH);
        if (state.holoAlpha <= 0.001) {
          return;
        }
        const time = Date.now() * 0.016;
        const nx = state.curNX;
        const ny = state.curNY;
        const hue1 = (nx * 320 + ny * 160 + time) % 360;
        const hue2 = hue1 + 90;
        const hue3 = hue1 + 190;
        const hue4 = hue1 + 270;

        holoCtx.save();
        holoCtx.globalAlpha = state.holoAlpha;
        holoCtx.beginPath();
        holoCtx.roundRect(0, 0, OW, OH, borderRadius);
        holoCtx.clip();

        const grad1 = holoCtx.createRadialGradient(
          nx * OW * 0.8 + OW * 0.1,
          ny * OH * 0.8 + OW * 0.1,
          0,
          nx * OW * 0.8 + OW * 0.1,
          ny * OH * 0.8 + OW * 0.1,
          OW * 0.9
        );
        grad1.addColorStop(0, `hsla(${hue1},100%,72%,0.95)`);
        grad1.addColorStop(0.2, `hsla(${hue2},95%,60%,0.75)`);
        grad1.addColorStop(0.5, `hsla(${hue3},85%,45%,0.4)`);
        grad1.addColorStop(0.8, `hsla(${hue4},70%,30%,0.15)`);
        grad1.addColorStop(1, "hsla(0,0%,0%,0)");
        holoCtx.fillStyle = grad1;
        holoCtx.fillRect(0, 0, OW, OH);

        holoCtx.globalCompositeOperation = "screen";
        const grad2 = holoCtx.createRadialGradient(
          (1 - nx) * OW,
          (1 - ny) * OH,
          0,
          (1 - nx) * OW,
          (1 - ny) * OH,
          OW * 0.7
        );
        grad2.addColorStop(0, `hsla(${hue1 + 180},100%,70%,0.45)`);
        grad2.addColorStop(0.35, `hsla(${hue2 + 180},90%,55%,0.2)`);
        grad2.addColorStop(0.7, `hsla(${hue3 + 180},70%,40%,0.05)`);
        grad2.addColorStop(1, "hsla(0,0%,0%,0)");
        holoCtx.fillStyle = grad2;
        holoCtx.fillRect(0, 0, OW, OH);

        holoCtx.globalCompositeOperation = "destination-in";
        holoCtx.drawImage(state.scratchCanvas, 0, 0, OW, OH);
        holoCtx.restore();
      }

      function updateLight(state) {
        const lightCtx = state.lightCtx;
        lightCtx.clearRect(0, 0, OW, OH);
        if (state.lightAlpha <= 0.001) {
          return;
        }
        const nx = state.curNX;
        const ny = state.curNY;
        const cx = nx * OW;
        const cy = ny * OH;
        const grad = lightCtx.createRadialGradient(cx, cy, 0, cx, cy, 160);
        grad.addColorStop(0, `rgba(255,255,255,${0.4 * state.lightAlpha})`);
        grad.addColorStop(0.3, `rgba(255,255,255,${0.1 * state.lightAlpha})`);
        grad.addColorStop(0.7, `rgba(255,255,255,${0.02 * state.lightAlpha})`);
        grad.addColorStop(1, "rgba(255,255,255,0)");
        lightCtx.beginPath();
        lightCtx.roundRect(0, 0, OW, OH, borderRadius);
        lightCtx.fillStyle = grad;
        lightCtx.fill();
      }

      function updateTilt(state) {
        state.curNX += (state.targetNX - state.curNX) * 0.1;
        state.curNY += (state.targetNY - state.curNY) * 0.1;
        const rotY = (state.curNX - 0.5) * 26;
        const rotX = -(state.curNY - 0.5) * 18;
        const shiftX = isCoarsePointer ? (state.curNX - 0.5) * 14 : 0;
        const shiftY = isCoarsePointer ? (state.curNY - 0.5) * 10 : 0;
        state.curRotX = rotX;
        state.curRotY = rotY;
        state.card.style.transform = `translate3d(${shiftX}px, ${shiftY}px, 0) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        const tiltStrength = Math.sqrt(rotX * rotX + rotY * rotY);
        const targetHolo = state.hovering ? Math.min(1, tiltStrength / 5) : 0;
        const targetLight = state.hovering ? Math.min(1, tiltStrength / 3) : 0;
        state.holoAlpha += (targetHolo - state.holoAlpha) * 0.15;
        state.lightAlpha += (targetLight - state.lightAlpha) * 0.15;
      }

      function getScratchProgress(state) {
        const img = state.scratchCtx.getImageData(0, 0, OW, OH).data;
        let cleared = 0;
        for (let i = 3; i < img.length; i += 4) {
          if (img[i] === 0) {
            cleared += 1;
          }
        }
        state.scratchProgress = cleared / (img.length / 4);
        if (!state.scratchLabelHidden) {
          state.scratchLabel.style.opacity = Math.max(
            0,
            1 - state.scratchProgress * 2
          );
        }
        if (!state.confettiFired && state.scratchProgress >= 0.4) {
          state.confettiFired = true;
          spawnConfetti(state);
          if (state.hasScratchAudio) {
            vibrate(18);
          }
        }
      }

      function onPointerMove(state, e) {
        const rect = state.overlay.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        if (state.isScratching) {
          scratchAt(state, x, y);
          spawnChips(state, x, y);
          if (state.lastPoint) {
            const dx = x - state.lastPoint.x;
            const dy = y - state.lastPoint.y;
            const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
            const step = isCoarsePointer ? 1.4 : 0.5;
            for (let i = 0; i < dist; i += step) {
              const ix = state.lastPoint.x + (dx * i) / dist;
              const iy = state.lastPoint.y + (dy * i) / dist;
              scratchAt(state, ix, iy);
            }
          }
          state.lastPoint = { x, y };
          const now = Date.now();
          if (now - state.lastMeasure > 180) {
            state.lastMeasure = now;
            getScratchProgress(state);
          }
          updateScratchSound(state);
        }
      }

      function resetCard(state) {
        drawScratchLayer(state);
        state.holoCtx.clearRect(0, 0, OW, OH);
        state.lightCtx.clearRect(0, 0, OW, OH);
        state.chipCtx.clearRect(0, 0, OW + 160, OH + 160);
        state.confettiCtx.clearRect(0, 0, cardW + 600, cardH + 600);
        state.chips.length = 0;
        state.confetti.length = 0;
        state.scratchProgress = 0;
        state.confettiFired = false;
        state.scratchLabel.style.opacity = 1;
        state.scratchLabelHidden = false;
        state.targetNX = 0.5;
        state.targetNY = 0.5;
        state.curNX = 0.5;
        state.curNY = 0.5;
        state.holoAlpha = 0;
        state.lightAlpha = 0;
        state.card.style.transform = "translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg)";
        stopScratchSound(state);
        state.card.classList.remove("is-jolting");
      }

      function createCardState(card) {
        const overlay = card.querySelector(".overlay-wrap");
        const scratchCanvas = card.querySelector(".scratch-canvas");
        const holoCanvas = card.querySelector(".holo-canvas");
        const lightCanvas = card.querySelector(".light-canvas");
        const chipCanvas = card.querySelector(".chip-canvas");
        const confettiCanvas = card.querySelector(".confetti-canvas");
        const scratchLabel = card.querySelector(".scratch-label");

        const state = {
          card,
          overlay,
          scratchCanvas,
          holoCanvas,
          lightCanvas,
          chipCanvas,
          confettiCanvas,
          scratchLabel,
          scratchCtx: scratchCanvas.getContext("2d"),
          holoCtx: holoCanvas.getContext("2d"),
          lightCtx: lightCanvas.getContext("2d"),
          chipCtx: chipCanvas.getContext("2d"),
          confettiCtx: confettiCanvas.getContext("2d"),
          chips: [],
          confetti: [],
          isScratching: false,
          lastPoint: null,
          brushConfig: null,
          scratchProgress: 0,
          confettiFired: false,
          scratchLabelHidden: false,
          targetNX: 0.5,
          targetNY: 0.5,
          curNX: 0.5,
          curNY: 0.5,
          curRotX: 0,
          curRotY: 0,
          hovering: false,
          holoAlpha: 0,
          lightAlpha: 0,
          lastMeasure: 0,
          hasScratchAudio: card.classList.contains("card-02"),
          audioEl: null,
          joltTimer: null,
        };

        resizeCanvases(state);
        drawScratchLayer(state);

        overlay.addEventListener("pointerdown", (e) => {
          if (isCoarsePointer && !motionPermissionRequested) {
            motionPermissionRequested = true;
            enableMotionTilt().then((enabled) => {
              if (!enabled) {
                touchTiltActive = true;
              }
            });
          } else if (isCoarsePointer && !motionEnabled) {
            touchTiltActive = true;
          }
          state.isScratching = true;
          state.lastPoint = null;
          state.brushConfig = createBrushConfig();
          if (!state.scratchLabelHidden) {
            state.scratchLabelHidden = true;
            state.scratchLabel.style.opacity = 0;
          }
          if (state.hasScratchAudio) {
            startScratchSound(state);
            vibrate([10]);
            triggerJolt(state);
          }
          if (isCoarsePointer && touchTiltActive) {
            handleTouchTilt(state, e.clientX, e.clientY);
          }
          onPointerMove(state, e);
        });

        overlay.addEventListener("pointermove", (e) => {
          if (isCoarsePointer && touchTiltActive) {
            handleTouchTilt(state, e.clientX, e.clientY);
          }
          onPointerMove(state, e);
        });
        return state;
      }

      const states = cards.map((card) => createCardState(card));

      function loop() {
        states.forEach((state) => {
          const isIdle =
            !state.hovering &&
            !state.isScratching &&
            state.chips.length === 0 &&
            state.confetti.length === 0 &&
            Math.abs(state.targetNX - 0.5) < 0.001 &&
            Math.abs(state.targetNY - 0.5) < 0.001 &&
            Math.abs(state.curNX - 0.5) < 0.001 &&
            Math.abs(state.curNY - 0.5) < 0.001 &&
            state.holoAlpha < 0.002 &&
            state.lightAlpha < 0.002;
          if (isIdle) {
            return;
          }
          updateTilt(state);
          updateHolo(state);
          updateLight(state);
          updateParticles(state);
        });
        requestAnimationFrame(loop);
      }

      function init() {
        window.addEventListener("pointerup", () => {
          states.forEach((state) => {
            if (state.isScratching) {
              getScratchProgress(state);
            }
            state.isScratching = false;
            state.lastPoint = null;
            state.brushConfig = null;
            stopScratchSound(state);
            if (isCoarsePointer && touchTiltActive && !motionEnabled) {
              state.hovering = false;
              state.targetNX = 0.5;
              state.targetNY = 0.5;
            }
          });
        });

        if (!isCoarsePointer) {
          frame.addEventListener("pointermove", (e) => {
            states.forEach((state) => {
              const rect = state.card.getBoundingClientRect();
              const x = e.clientX - rect.left;
              const y = e.clientY - rect.top;
              const inside =
                x >= 0 && y >= 0 && x <= rect.width && y <= rect.height;
              state.hovering = inside;
              if (inside) {
                state.targetNX = Math.min(1, Math.max(0, x / rect.width));
                state.targetNY = Math.min(1, Math.max(0, y / rect.height));
              } else {
                state.targetNX = 0.5;
                state.targetNY = 0.5;
              }
            });
          });
        } else {
          window.addEventListener("deviceorientation", handleDeviceTilt, {
            passive: true,
          });
        }

        restartBtn.addEventListener("click", () => {
          states.forEach((state) => resetCard(state));
        });

        loop();
      }

      init();
    </script>
  </body>
</html>
